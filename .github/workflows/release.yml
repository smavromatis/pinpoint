name: Release Pinpoint Extension

on:
  push:
    tags:
      - 'v*' # Trigger on tags like v1.0, v2.1.3, etc.

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build and Test explicitly
        run: ./gradlew build test --no-daemon

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/Pinpoint-*.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
